import urllib.request
import re
import ipaddress

DOMAINS = set()
CIDRS = set()

def is_valid_ip(ip_str):
    """Проверяет, является ли строка корректным IPv4-адресом."""
    try:
        ipaddress.IPv4Address(ip_str)
        return True
    except:
        return False

def is_valid_cidr(cidr_str):
    """Проверяет, является ли строка корректной IPv4-сетью в формате CIDR."""
    try:
        ipaddress.IPv4Network(cidr_str, strict=False)
        return True
    except:
        return False

def normalize_ip_or_cidr(entry):
    """
    Преобразует IP-адрес в CIDR /32 или возвращает CIDR как есть.
    """
    entry = entry.strip()
    if not entry:
        return None
        
    if '/' in entry:
        if is_valid_cidr(entry):
            return entry
        else:
            return None
    elif is_valid_ip(entry):
        return f"{entry}/32"
    else:
        return None

sources = [
    # (url, тип)
    ("https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/whitelist.txt", "domain"),
    ("https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/ipwhitelist.txt", "ip"), # <--- ИЗМЕНЕН ТИП
    ("https://raw.githubusercontent.com/kort0881/russia-whitelist/refs/heads/main/whitelist.txt", "domain_port"),
    ("https://raw.githubusercontent.com/jsxta/whitelist-russia/refs/heads/master/source/config/cidrwhitelist.txt", "cidr"),
    ("https://raw.githubusercontent.com/chebur-net/russia-mobile-whitelist/refs/heads/main/moscow-tele2/whitelist.csv", "csv"),
    ("https://raw.githubusercontent.com/chebur-net/russia-mobile-whitelist/refs/heads/main/spb-tele2/whitelist.csv", "csv"),
    ("https://raw.githubusercontent.com/De1ta01/adguard-russian-gov-whitelist/refs/heads/main/whitelist.txt", "domain"),
    ("https://raw.githubusercontent.com/Zhuk001/vpn-rules/refs/heads/master/whitelist.txt", "mixed"),
]

for url, ftype in sources:
    try:
        print(f"Processing: {url}")
        req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
        with urllib.request.urlopen(req, timeout=30) as response:
            content = response.read().decode('utf-8', errors='ignore')
        
        for line in content.splitlines():
            line = line.strip()
            if not line or line.startswith('#'):
                continue
            
            # --- Обработка IP-адресов из ipwhitelist.txt ---
            if ftype == "ip":
                # Проверяем, является ли строка IP-адресом (или CIDR)
                normalized = normalize_ip_or_cidr(line)
                if normalized:
                    CIDRS.add(normalized)
                continue

            # --- Далее идут старые обработчики для доменов и CSV ---
            if ftype == "domain":
                if '.' in line and not '/' in line:
                    DOMAINS.add(line)
            elif ftype == "domain_port":
                domain = line.split(':')[0]
                if '.' in domain:
                    DOMAINS.add(domain)
            elif ftype == "cidr":
                if '/' in line:
                    CIDRS.add(line)
            elif ftype == "csv":
                parts = line.split(',')
                for part in parts:
                    part = part.strip()
                    if '/' in part:
                        CIDRS.add(part)
                    elif '.' in part:
                        DOMAINS.add(part)
            elif ftype == "mixed":
                if '/' in line:
                    CIDRS.add(line)
                elif ',' in line:
                    for part in line.split(','):
                        part = part.strip()
                        if '/' in part:
                            CIDRS.add(part)
                        elif '.' in part:
                            DOMAINS.add(part)
                elif '.' in line:
                    DOMAINS.add(line)
                    
    except Exception as e:
        print(f"Error processing {url}: {e}")

# Сортируем и сохраняем
with open("whitelist-domains.txt", "w") as f:
    for d in sorted(DOMAINS):
        f.write(d + "\n")

with open("whitelist-ips.txt", "w") as f:
    for c in sorted(CIDRS):
        f.write(c + "\n")

print(f"✅ Доменов: {len(DOMAINS)}")
print(f"✅ IP-сетей (в формате CIDR): {len(CIDRS)}")
