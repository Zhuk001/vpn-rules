name: Merge Whitelists

on:
  schedule:
    - cron: "0 */6 * * *"  # ← кавычки обязательны!
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and parse all sources
        run: |
          python3 << 'EOF'
          import urllib.request
          import ipaddress

          DOMAINS = set()
          CIDRS = set()

          def is_valid_ip(ip_str):
              try:
                  ipaddress.IPv4Address(ip_str)
                  return True
              except:
                  return False

          def is_valid_cidr(cidr_str):
              try:
                  ipaddress.IPv4Network(cidr_str, strict=False)
                  return True
              except:
                  return False

          def normalize_ip_or_cidr(entry):
              entry = entry.strip()
              if not entry:
                  return None
              if '/' in entry:
                  if is_valid_cidr(entry):
                      return entry
                  return None
              elif is_valid_ip(entry):
                  return f"{entry}/32"
              return None

          sources = [
              ("https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/whitelist.txt", "domain"),
              ("https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/ipwhitelist.txt", "ip"),
              ("https://raw.githubusercontent.com/kort0881/russia-whitelist/refs/heads/main/whitelist.txt", "domain_port"),
              ("https://raw.githubusercontent.com/jsxta/whitelist-russia/refs/heads/master/source/config/cidrwhitelist.txt", "cidr"),
              ("https://raw.githubusercontent.com/chebur-net/russia-mobile-whitelist/refs/heads/main/moscow-tele2/whitelist.csv", "csv"),
              ("https://raw.githubusercontent.com/chebur-net/russia-mobile-whitelist/refs/heads/main/spb-tele2/whitelist.csv", "csv"),
              ("https://raw.githubusercontent.com/De1ta01/adguard-russian-gov-whitelist/refs/heads/main/whitelist.txt", "domain"),
              ("https://raw.githubusercontent.com/Zhuk001/vpn-rules/refs/heads/master/whitelist.txt", "mixed"),
          ]

          for url, ftype in sources:
              try:
                  print(f"Processing: {url}")
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=30) as response:
                      content = response.read().decode('utf-8', errors='ignore')
                  
                  for line in content.splitlines():
                      line = line.strip()
                      if not line or line.startswith('#'):
                          continue
                      
                      if ftype == "ip":
                          normalized = normalize_ip_or_cidr(line)
                          if normalized:
                              CIDRS.add(normalized)
                          continue

                      if ftype == "domain":
                          if '.' in line and '/' not in line:
                              DOMAINS.add(line)
                      elif ftype == "domain_port":
                          domain = line.split(':')[0]
                          if '.' in domain:
                              DOMAINS.add(domain)
                      elif ftype == "cidr":
                          if '/' in line:
                              CIDRS.add(line)
                      elif ftype == "csv":
                          for part in line.split(','):
                              part = part.strip()
                              if '/' in part:
                                  CIDRS.add(part)
                              elif '.' in part:
                                  DOMAINS.add(part)
                      elif ftype == "mixed":
                          if '/' in line:
                              CIDRS.add(line)
                          elif ',' in line:
                              for part in line.split(','):
                                  part = part.strip()
                                  if '/' in part:
                                      CIDRS.add(part)
                                  elif '.' in part:
                                      DOMAINS.add(part)
                          elif '.' in line:
                              DOMAINS.add(line)
                                
              except Exception as e:
                  print(f"Error: {e}")

          with open("whitelist-domains.txt", "w") as f:
              for d in sorted(DOMAINS):
                  f.write(d + "\n")

          with open("whitelist-ips.txt", "w") as f:
              for c in sorted(CIDRS):
                  f.write(c + "\n")

          print(f"✅ Domains: {len(DOMAINS)}")
          print(f"✅ CIDRs: {len(CIDRS)}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add whitelist-domains.txt whitelist-ips.txt
          git diff --staged --quiet || git commit -m "Auto merge whitelists $(date +'%Y-%m-%d %H:%M:%S')"
          git push
