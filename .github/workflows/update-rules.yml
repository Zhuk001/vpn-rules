name: Update VPN Rules

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download latest .dat files
        run: |
          wget -O geosite.dat https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/geosite.dat
          wget -O geoip.dat https://github.com/runetfreedom/russia-blocked-geoip/releases/latest/download/geoip.dat

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install geodat2srs
        run: go install github.com/runetfreedom/geodat2srs@latest

      - name: Convert .dat to .srs
        run: |
          rm -rf rules_temp
          mkdir -p rules_temp
          ~/go/bin/geodat2srs geosite -i geosite.dat -o rules_temp/
          ~/go/bin/geodat2srs geoip -i geoip.dat -o rules_temp/

      - name: Force overwrite files + touch (обновляем timestamp)
        run: |
          mkdir -p rules
          
          # Принудительно копируем и сразу обновляем дату модификации
          cp -f rules_temp/geoip-ru-whitelist.srs rules/ 2>/dev/null && touch rules/geoip-ru-whitelist.srs || echo "geoip-ru-whitelist.srs not found"
          cp -f rules_temp/geoip-ru.srs rules/ 2>/dev/null && touch rules/geoip-ru.srs || echo "geoip-ru.srs not found"
          cp -f rules_temp/geoip-ru-blocked.srs rules/ 2>/dev/null && touch rules/geoip-ru-blocked.srs || echo "geoip-ru-blocked.srs not found"
          cp -f rules_temp/geosite-ru-blocked-all.srs rules/ 2>/dev/null && touch rules/geosite-ru-blocked-all.srs || echo "geosite-ru-blocked-all.srs not found"
          
          echo "=== Files after force copy ==="
          ls -la rules/

      - name: Cleanup
        run: rm -f geosite.dat geoip.dat

      - name: Force commit and push every time
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Принудительно добавляем все файлы
          git add -f rules/
          
          # Всегда создаём новый коммит (даже если файлы идентичны)
          git commit -m "Auto update VPN rules $(date +'%Y-%m-%d %H:%M:%S')" --allow-empty || echo "Nothing to commit (should not happen)"
          
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
