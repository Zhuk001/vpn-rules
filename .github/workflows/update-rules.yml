name: Update VPN Rules
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
     
      - name: Download source files
        run: |
          wget -O geosite.dat https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/geosite.dat
          wget -O geoip.dat https://github.com/runetfreedom/russia-blocked-geoip/releases/latest/download/geoip.dat
     
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
     
      - name: Install geodat2srs
        run: go install github.com/runetfreedom/geodat2srs@latest
     
      - name: Convert and copy files
        run: |
          # Конвертируем
          ~/go/bin/geodat2srs geosite -i geosite.dat -o rules/
          ~/go/bin/geodat2srs geoip -i geoip.dat -o rules/
          
          # Удаляем всё, кроме 4 нужных файлов
          cd rules
          for f in *.srs; do
            case "$f" in
              "geoip-ru-whitelist.srs"|"geoip-ru.srs"|"geoip-ru-blocked.srs"|"geosite-ru-blocked-all.srs")
                echo "Keeping $f"
                ;;
              *)
                echo "Removing $f"
                rm -f "$f"
                ;;
            esac
          done
          cd ..
          
          # Показываем результат
          ls -la rules/
     
      - name: Push to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rules/
          git commit -m "Update rules $(date +'%Y-%m-%d')" || exit 0
          git push origin master --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
