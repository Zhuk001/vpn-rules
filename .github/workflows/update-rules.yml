name: Update VPN Rules

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      # === 1. НАСТРАИВАЕМ GIT ===
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      # === 2. ЖЁСТКО УДАЛЯЕМ ПАПКУ ИЗ GIT ===
      - name: Remove old rules folder from Git completely
        run: |
          git rm -rf rules 2>/dev/null || true
          rm -rf rules
          git commit -m "Remove old rules folder before fresh update" --allow-empty || true
          echo "Old rules folder removed from Git"

      - name: Download latest .dat files
        run: |
          wget -O geosite.dat https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/geosite.dat
          wget -O geoip.dat https://github.com/runetfreedom/russia-blocked-geoip/releases/latest/download/geoip.dat

      - name: Setup Go + Convert
        run: |
          go install github.com/runetfreedom/geodat2srs@latest
          rm -rf rules_temp
          mkdir -p rules_temp
          ~/go/bin/geodat2srs geosite -i geosite.dat -o rules_temp/
          ~/go/bin/geodat2srs geoip -i geoip.dat -o rules_temp/

      - name: Create fresh rules folder
        run: |
          mkdir -p rules
          cp rules_temp/geoip-ru-whitelist.srs rules/ 2>/dev/null || true
          cp rules_temp/geoip-ru.srs rules/ 2>/dev/null || true
          cp rules_temp/geoip-ru-blocked.srs rules/ 2>/dev/null || true
          cp rules_temp/geosite-ru-blocked-all.srs rules/ 2>/dev/null || true
          
          echo "=== Final files in rules/ ==="
          ls -la rules/

      - name: Final commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add -f rules/
          git commit -m "Auto update VPN rules $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin master --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
