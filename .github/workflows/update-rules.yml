name: Update VPN Rules
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
     
      - name: Download .dat files from runetfreedom
        run: |
          wget -O geosite.dat https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/geosite.dat
          wget -O geoip.dat https://github.com/runetfreedom/russia-blocked-geoip/releases/latest/download/geoip.dat
     
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
     
      - name: Install geodat2srs
        run: go install github.com/runetfreedom/geodat2srs@latest
     
      - name: Convert .dat to .srs
        run: |
          # Конвертируем во временную папку
          mkdir -p temp_convert
          ~/go/bin/geodat2srs geosite -i geosite.dat -o temp_convert/
          ~/go/bin/geodat2srs geoip -i geoip.dat -o temp_convert/
          
          # Показываем что получилось
          echo "=== Generated files ==="
          ls -la temp_convert/
     
      - name: Copy 4 files to rules folder (overwrite)
        run: |
          # Создаём папку rules если нет
          mkdir -p rules
          
          # Копируем и ПЕРЕЗАПИСЫВАЕМ 4 файла
          cp -f temp_convert/geoip-ru-whitelist.srs rules/ 2>/dev/null && echo "✅ geoip-ru-whitelist.srs" || echo "❌ NOT FOUND"
          cp -f temp_convert/geoip-ru.srs rules/ 2>/dev/null && echo "✅ geoip-ru.srs" || echo "❌ NOT FOUND"
          cp -f temp_convert/geoip-ru-blocked.srs rules/ 2>/dev/null && echo "✅ geoip-ru-blocked.srs" || echo "❌ NOT FOUND"
          cp -f temp_convert/geosite-ru-blocked-all.srs rules/ 2>/dev/null && echo "✅ geosite-ru-blocked-all.srs" || echo "❌ NOT FOUND"
          
          # Удаляем временную папку
          rm -rf temp_convert
          
          # Показываем что в rules
          echo "=== Final files in rules/ ==="
          ls -la rules/
     
      - name: Cleanup
        run: rm -f geosite.dat geoip.dat
     
      - name: Commit and push to YOUR repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rules/
          git commit -m "Auto update rules $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push origin master --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
