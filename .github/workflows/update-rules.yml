name: Update VPN Rules

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download geosite.dat
        run: |
          wget -O geosite.dat https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/geosite.dat
          wget -O geoip.dat https://github.com/runetfreedom/russia-blocked-geoip/releases/latest/download/geoip.dat
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install geodat2srs
        run: go install github.com/runetfreedom/geodat2srs@latest
      
      - name: Convert geosite
        run: ~/go/bin/geodat2srs geosite -i geosite.dat -o rules/
      
      - name: Convert geoip
        run: ~/go/bin/geodat2srs geoip -i geoip.dat -o rules/
      
      - name: Cleanup
        run: rm geosite.dat geoip.dat
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rules/
          git commit -m "Auto update rules" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
