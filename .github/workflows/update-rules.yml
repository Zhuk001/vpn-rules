name: Update VPN Rules

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download latest .dat files
        run: |
          wget -O geosite.dat https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/geosite.dat
          wget -O geoip.dat https://github.com/runetfreedom/russia-blocked-geoip/releases/latest/download/geoip.dat

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install geodat2srs
        run: go install github.com/runetfreedom/geodat2srs@latest

      - name: Convert .dat to .srs
        run: |
          rm -rf rules_temp
          mkdir -p rules_temp
          ~/go/bin/geodat2srs geosite -i geosite.dat -o rules_temp/
          ~/go/bin/geodat2srs geoip -i geoip.dat -o rules_temp/

      - name: Delete old rules and create fresh with timestamp
        run: |
          rm -rf rules
          mkdir -p rules
          
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
          
          for file in geoip-ru-whitelist.srs geoip-ru.srs geoip-ru-blocked.srs geosite-ru-blocked-all.srs; do
            if [ -f "rules_temp/$file" ]; then
              cp "rules_temp/$file" "rules/$file"
              echo "# Updated: $TIMESTAMP" >> "rules/$file"
              echo "Processed $file with timestamp"
            else
              echo "$file not found"
            fi
          done
          
          ls -la rules/

      - name: Cleanup
        run: rm -f geosite.dat geoip.dat

      - name: Force commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add -f rules/
          
          git commit -m "Auto update VPN rules $(date +'%Y-%m-%d %H:%M:%S')" --allow-empty || echo "Nothing to commit"
          
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
