name: Update VPN Rules
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
     
      - name: Download geosite.dat and geoip.dat
        run: |
          wget -O geosite.dat https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/geosite.dat
          wget -O geoip.dat https://github.com/runetfreedom/russia-blocked-geoip/releases/latest/download/geoip.dat
     
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
     
      - name: Install geodat2srs
        run: go install github.com/runetfreedom/geodat2srs@latest
     
      - name: Convert geosite and list files
        run: |
          ~/go/bin/geodat2srs geosite -i geosite.dat -o rules/
          echo "=== GEOSITE FILES ==="
          ls -la rules/ | grep geosite
     
      - name: Convert geoip and list files
        run: |
          ~/go/bin/geodat2srs geoip -i geoip.dat -o rules/
          echo "=== GEOIP FILES ==="
          ls -la rules/ | grep geoip
     
      - name: Copy and rename files correctly
        run: |
          cd rules
          
          # geosite файлы (может быть несколько вариантов)
          if [ -f "geosite-ru-blocked.srs" ]; then
            cp geosite-ru-blocked.srs geosite-ru-blocked-all.srs
            echo "✅ Copied geosite-ru-blocked.srs → geosite-ru-blocked-all.srs"
          fi
          
          if [ -f "geosite-ru-blocked-all.srs" ]; then
            echo "✅ geosite-ru-blocked-all.srs already exists"
          fi
          
          # geoip файлы
          if [ -f "geoip-ru.srs" ]; then
            echo "✅ geoip-ru.srs exists"
          fi
          
          if [ -f "geoip-ru-blocked.srs" ]; then
            echo "✅ geoip-ru-blocked.srs exists"
          fi
          
          if [ -f "geoip-ru-whitelist.srs" ]; then
            echo "✅ geoip-ru-whitelist.srs exists"
          fi
          
          # Показать все файлы для отладки
          echo "=== ALL FILES IN rules/ ==="
          ls -la
          
          cd ..
     
      - name: Ensure all required files exist
        run: |
          # Создаём пустые файлы если их нет (чтобы не ломалось приложение)
          touch rules/geoip-ru-whitelist.srs
          touch rules/geoip-ru.srs
          touch rules/geoip-ru-blocked.srs
          touch rules/geosite-ru-blocked-all.srs
     
      - name: Cleanup source files
        run: rm geosite.dat geoip.dat
     
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rules/
          git commit -m "Auto update rules $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
