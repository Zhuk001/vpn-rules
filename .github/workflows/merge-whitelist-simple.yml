name: Merge Whitelist Simple

on:
  schedule:
    - cron: "0 */3 * * *"  # каждые 3 часа
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and parse sources
        run: |
          python3 << 'EOF'
          import urllib.request
          import ipaddress

          DOMAINS = set()
          CIDRS = set()

          def is_valid_cidr(cidr_str):
              try:
                  ipaddress.IPv4Network(cidr_str, strict=False)
                  return True
              except:
                  return False

          # Источники доменов
          domain_sources = [
              "https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/whitelist.txt",
              "https://raw.githubusercontent.com/kort0881/russia-whitelist/refs/heads/main/whitelist.txt",
              "https://raw.githubusercontent.com/De1ta01/adguard-russian-gov-whitelist/refs/heads/main/whitelist.txt",
          ]

          # Источники CIDR
          cidr_sources = [
              "https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/cidrwhitelist.txt",
          ]

          # Парсим домены
          for url in domain_sources:
              try:
                  print(f"Processing domains from: {url}")
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=30) as response:
                      content = response.read().decode('utf-8', errors='ignore')
                  
                  for line in content.splitlines():
                      line = line.strip()
                      if not line or line.startswith('#'):
                          continue
                      
                      # Убираем порты если есть
                      if ':' in line:
                          line = line.split(':')[0]
                      
                      # Проверяем что похоже на домен
                      if '.' in line and '/' not in line and not line.replace('.', '').replace('-', '').isnumeric():
                          DOMAINS.add(line)
                          
              except Exception as e:
                  print(f"Error processing {url}: {e}")

          # Парсим CIDR
          for url in cidr_sources:
              try:
                  print(f"Processing CIDRs from: {url}")
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=30) as response:
                      content = response.read().decode('utf-8', errors='ignore')
                  
                  for line in content.splitlines():
                      line = line.strip()
                      if not line or line.startswith('#'):
                          continue
                      
                      # Проверяем что это CIDR
                      if '/' in line and is_valid_cidr(line):
                          CIDRS.add(line)
                          
              except Exception as e:
                  print(f"Error processing {url}: {e}")

          # Сохраняем домены
          with open("domain.txt", "w") as f:
              for d in sorted(DOMAINS):
                  f.write(d + "\n")

          # Сохраняем CIDR
          with open("cidrwhitelist.txt", "w") as f:
              for c in sorted(CIDRS):
                  f.write(c + "\n")

          print(f"✅ Domains saved: {len(DOMAINS)}")
          print(f"✅ CIDRs saved: {len(CIDRS)}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add domain.txt cidrwhitelist.txt
          git diff --staged --quiet || git commit -m "Auto merge whitelist simple $(date +'%Y-%m-%d %H:%M:%S')"
          git push
